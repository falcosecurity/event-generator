tests:
  - name: test_syscalls_connect
    description: "Testing connect system call"
    runner: HostRunner
    resources:
      - type: clientServer
        name: cs1
        l4Proto: tcp4
        address: 11.11.11.11:80
    steps:
      - type: syscall
        name: s1
        syscall: socket
        args:
          domain: AF_INET
          type: SOCK_STREAM
          protocol: 0
      - type: syscall
        name: c1
        syscall: connect
        args:
          fd: "${s1.ret}"
          address: 11.11.11.11:80
  - name: test_syscalls_dup
    description: "Testing dup system call"
    runner: HostRunner
    steps:
      - type: syscall
        name: d1
        syscall: dup
        args:
          oldFd: 1
  - name: test_syscalls_dup2
    description: "Testing dup2 system call"
    runner: HostRunner
    steps:
      - type: syscall
        name: d1
        syscall: dup2
        args:
          oldFd: 1
          newFd: 100
  - name: test_syscalls_dup3
    description: "Testing dup3 system call"
    runner: HostRunner
    steps:
      - type: syscall
        name: d1
        syscall: dup3
        args:
          oldFd: 1
          newFd: 101
          flags: 0
  - name: test_syscalls_kill
    description: "Testing kill system call"
    runner: HostRunner
    resources:
      - type: process
        name: p1
    steps:
      - type: syscall
        name: k1
        syscall: kill
        args:
          pid: "${p1.pid}"
          sig: SIGKILL
  - name: test_syscalls_link
    description: "Testing link system call"
    runner: HostRunner
    resources:
      - type: fd
        name: f1
        subtype: file
        filePath: /tmp/file
    steps:
      - type: syscall
        name: l1
        syscall: link
        args:
          oldPath: "/tmp/file"
          newPath: "/tmp/link"
  - name: test_syscalls_linkat
    description: "Testing linkat system call"
    runner: HostRunner
    resources:
      - type: fd
        name: d1
        subtype: directory
        dirPath: /tmp
      - type: fd
        name: f1
        subtype: file
        filePath: /tmp/file
    steps:
      - type: syscall
        name: l1
        syscall: linkat
        args:
          oldDirFd: "${d1.fd}"
          oldPath: ./file
          newDirFd: "${d1.fd}"
          newPath: ./link
          flags: AT_SYMLINK_FOLLOW
  - name: test_syscalls_open
    description: "Testing open system call"
    runner: HostRunner
    steps:
      - type: syscall
        name: o1
        syscall: open
        args:
          pathname: /dev/random
          flags: O_RDONLY
          mode: 0
  - name: test_syscalls_openat
    description: "Testing openat system call"
    runner: HostRunner
    resources:
      - type: fd
        name: d1
        subtype: directory
        dirPath: /dev
    steps:
      - type: syscall
        name: o1
        syscall: openat
        args:
          dirFd: "${d1.fd}"
          pathname: ./random
          flags: O_RDONLY
          mode: 0
  - name: test_syscalls_openat2
    description: "Testing openat2 system call"
    runner: HostRunner
    resources:
      - type: fd
        name: d1
        subtype: directory
        dirPath: /dev
    steps:
      - type: syscall
        name: o1
        syscall: openat2
        args:
          dirFd: "${d1.fd}"
          pathname: ./random
          how:
            flags: O_RDONLY
            mode: 0
            resolve: RESOLVE_NO_MAGICLINKS
  - name: test_syscalls_read
    description: "Testing read system call"
    runner: HostRunner
    resources:
      - type: fd
        name: f1
        subtype: file
        filePath: /dev/random
    steps:
      - type: syscall
        name: r1
        syscall: read
        args:
          fd: "${f1.fd}"
          "buffer": "-----"
          len: 3
  - name: test_syscalls_socket
    description: "Testing socket system call"
    runner: HostRunner
    steps:
      - type: syscall
        name: s1
        syscall: socket
        args:
          domain: AF_INET
          type: SOCK_STREAM
          protocol: 0
  - name: test_syscalls_symlink
    description: "Testing symlink system call"
    runner: HostRunner
    resources:
      - type: fd
        name: f1
        subtype: file
        filePath: /tmp/file
    steps:
      - type: syscall
        name: l1
        syscall: symlink
        args:
          target: /tmp/file
          linkPath: /tmp/symlink
  - name: test_syscalls_symlinkat
    description: "Testing symlinkat system call"
    runner: HostRunner
    resources:
      - type: fd
        name: d1
        subtype: directory
        dirPath: /tmp
      - type: fd
        name: f1
        subtype: file
        filePath: /tmp/file
    steps:
      - type: syscall
        name: l1
        syscall: symlinkat
        args:
          target: /tmp/file
          newDirFd: "${d1.fd}"
          linkPath: ./symlink
  - name: test_syscalls_write
    description: "Testing write system call"
    runner: HostRunner
    steps:
      - type: syscall
        name: w1
        syscall: write
        args:
          fd: 1
          buffer: "hi!"
          len: 3
