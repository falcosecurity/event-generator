tests:
  - name: test_steps_syscall_connect
    description: "Demonstrates the `connect` syscall"
    runner: HostRunner
    resources:
      - type: clientServer
        name: cs1
        l4Proto: tcp4
        address: 11.11.11.11:80
    steps:
      - type: syscall
        name: s1
        syscall: socket
        args:
          domain: AF_INET
          type: SOCK_STREAM
          protocol: 0
      - type: syscall
        name: c1
        syscall: connect
        args:
          fd: "${s1.ret}"
          address: 11.11.11.11:80
  - name: test_steps_syscall_dup
    description: "Demonstrates the `dup` syscall"
    runner: HostRunner
    steps:
      - type: syscall
        name: d1
        syscall: dup
        args:
          oldFd: 1
  - name: test_steps_syscall_dup2
    description: "Demonstrates the `dup2` syscall"
    runner: HostRunner
    steps:
      - type: syscall
        name: d1
        syscall: dup2
        args:
          oldFd: 1
          newFd: 100
  - name: test_steps_syscall_dup3
    description: "Demonstrates the `dup3` syscall"
    runner: HostRunner
    steps:
      - type: syscall
        name: d1
        syscall: dup3
        args:
          oldFd: 1
          newFd: 101
          flags: 0
  - name: test_steps_syscall_kill
    description: "Demonstrates the `kill` syscall"
    runner: HostRunner
    resources:
      - type: process
        name: p1
    steps:
      - type: syscall
        name: k1
        syscall: kill
        args:
          pid: "${p1.pid}"
          sig: SIGKILL
  - name: test_steps_syscall_link
    description: "Demonstrates the `link` syscall"
    runner: HostRunner
    resources:
      - type: fd
        name: f1
        subtype: file
        filePath: /tmp/file
    steps:
      - type: syscall
        name: l1
        syscall: link
        args:
          oldPath: "/tmp/file"
          newPath: "/tmp/link"
  - name: test_steps_syscall_linkat
    description: "Demonstrates the `linkat` syscall"
    runner: HostRunner
    resources:
      - type: fd
        name: d1
        subtype: directory
        dirPath: /tmp
      - type: fd
        name: f1
        subtype: file
        filePath: /tmp/file
    steps:
      - type: syscall
        name: l1
        syscall: linkat
        args:
          oldDirFd: "${d1.fd}"
          oldPath: ./file
          newDirFd: "${d1.fd}"
          newPath: ./link
          flags: AT_SYMLINK_FOLLOW
  - name: test_steps_syscall_open
    description: "Demonstrates the `open` syscall"
    runner: HostRunner
    steps:
      - type: syscall
        name: o1
        syscall: open
        args:
          pathname: /dev/random
          flags: O_RDONLY
          mode: 0
  - name: test_steps_syscall_openat
    description: "Demonstrates the `openat` syscall"
    runner: HostRunner
    resources:
      - type: fd
        name: d1
        subtype: directory
        dirPath: /dev
    steps:
      - type: syscall
        name: o1
        syscall: openat
        args:
          dirFd: "${d1.fd}"
          pathname: ./random
          flags: O_RDONLY
          mode: 0
  - name: test_steps_syscall_openat2
    description: "Demonstrates the `openat2` syscall"
    runner: HostRunner
    resources:
      - type: fd
        name: d1
        subtype: directory
        dirPath: /dev
    steps:
      - type: syscall
        name: o1
        syscall: openat2
        args:
          dirFd: "${d1.fd}"
          pathname: ./random
          how:
            flags: O_RDONLY
            mode: 0
            resolve: RESOLVE_NO_MAGICLINKS
  - name: test_steps_syscall_read
    description: "Demonstrates the `read` syscall"
    runner: HostRunner
    resources:
      - type: fd
        name: f1
        subtype: file
        filePath: /dev/random
    steps:
      - type: syscall
        name: r1
        syscall: read
        args:
          fd: "${f1.fd}"
          "buffer": "-----"
          len: 3
  - name: test_steps_syscall_socket
    description: "Demonstrates the `socket` syscall"
    runner: HostRunner
    steps:
      - type: syscall
        name: s1
        syscall: socket
        args:
          domain: AF_INET
          type: SOCK_STREAM
          protocol: 0
  - name: test_steps_syscall_symlink
    description: "Demonstrates the `symlink` syscall"
    runner: HostRunner
    resources:
      - type: fd
        name: f1
        subtype: file
        filePath: /tmp/file
    steps:
      - type: syscall
        name: l1
        syscall: symlink
        args:
          target: /tmp/file
          linkPath: /tmp/symlink
  - name: test_steps_syscall_symlinkat
    description: "Demonstrates the `symlinkat` syscall"
    runner: HostRunner
    resources:
      - type: fd
        name: d1
        subtype: directory
        dirPath: /tmp
      - type: fd
        name: f1
        subtype: file
        filePath: /tmp/file
    steps:
      - type: syscall
        name: l1
        syscall: symlinkat
        args:
          target: /tmp/file
          newDirFd: "${d1.fd}"
          linkPath: ./symlink
  - name: test_steps_syscall_write
    description: "Demonstrates the `write` syscall"
    runner: HostRunner
    steps:
      - type: syscall
        name: w1
        syscall: write
        args:
          fd: 1
          buffer: "hi!"
          len: 3
