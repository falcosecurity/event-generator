version: "2"

linters:
  default: none
  enable:
    - asciicheck
    - bodyclose
    - copyloopvar
    - dogsled
    - dupl
    # - err113
    - errcheck
    - errorlint
    - exhaustive
    # - funlen
    # - gochecknoglobals
    # - gochecknoinits
    # - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godot
    # - godox
    - goheader
    - gomodguard_v2
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - lll
    - misspell
    # - mnd
    - nakedret
    # - nestif
    - noctx
    - nolintlint
    # - prealloc
    - revive
    - rowserrcheck
    - staticcheck
    # - testpackage
    - unconvert
    - unparam
    - unused
    - whitespace
    # - wsl
  settings:
    dupl:
      threshold: 300
    exhaustive:
      default-signifies-exhaustive: true
    goconst:
      min-len: 2
      min-occurrences: 2
    gocritic:
      disabled-checks:
        # Conflicts with govet check-shadowing
        - sloppyReassign
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    goheader:
      values:
        const:
          AUTHORS: The Falco Authors
      template: |-
        SPDX-License-Identifier: Apache-2.0
        Copyright (C) {{ YEAR }} {{ AUTHORS }}

        Licensed under the Apache License, Version 2.0 (the "License");
        you may not use this file except in compliance with the License.
        You may obtain a copy of the License at

             http://www.apache.org/licenses/LICENSE-2.0

        Unless required by applicable law or agreed to in writing, software
        distributed under the License is distributed on an "AS IS" BASIS,
        WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.
        See the License for the specific language governing permissions and
        limitations under the License.
    lll:
      line-length: 150
    misspell:
      locale: US
    nolintlint:
      allow-unused: false # report any unused nolint directives
      require-explanation: true # require an explanation for nolint directives
      require-specific: true # require nolint directives to be specific about which linter is being skipped
  exclusions:
    generated: lax
    rules:
      - linters:
          - govet
        text: declaration of "(err|ctx)" shadows declaration at
      # Disable the check to test errors type assertion on switches.
      - linters:
          - errorlint
        text: type switch on error will fail on wrapped errors. Use errors.As to check for specific errors

      # Exclude the following linters from running on tests files.
      - linters:
          - gosec
        path: _test\.go

      # errcheck: Almost all programs ignore errors on these functions and in most cases it's ok
      - path: (.+)\.go$
        text: Error return value of .((os\.)?std(out|err)\..*|.*Close|.*Flush|os\.Remove(All)?|.*printf?|os\.(Un)?Setenv). is not checked
    paths:
      - third_party$
      - builtin$
      - examples$

issues:
  #fix: true

  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gci
    - gofmt
    - goimports
  settings:
    gci:
      sections:
        - standard                          # Captures all standard packages if they do not match another section.
        - default                           # Contains all imports that could not be matched to another section type.
        - prefix(github.com/falcosecurity/event-generator)  # Groups all imports with the specified Prefix.
    goimports:
      local-prefixes:
        - github.com/falcosecurity/event-generator
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
